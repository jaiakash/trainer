name: Self Runner Approval Workflow

on:
  pull_request:
    paths:
      - "examples/**"

jobs:
  check-and-request-approval:
    if: github.event.pull_request.user.login != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Request approval from @jaiakash
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo, number } = context.issue;
            const commentBody = `:lock: Changes detected in \`examples\`.
            Hi @jaiakash, please approve by commenting:
            \`\`\`
            /run-self-runner
            \`\`\`
            This will trigger the self-runner job on OKE infra.`;
                        await github.rest.issues.createComment({
                          owner,
                          repo,
                          issue_number: number,
                          body: commentBody
            });

  wait-for-approval:
    name: Wait for approval from @jaiakash
    needs: check-and-request-approval
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Poll for `/run-self-runner` by @jaiakash
        id: find-approval
        uses: peter-evans/find-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'jaiakash'
          body-includes: '/run-self-runner'

      - name: Check approval found
        run: |
          if [[ -z "${{ steps.find-approval.outputs.comment-id }}" ]]; then
            echo "❌ No approval found within timeout."
            exit 1
          else
            echo "✅ Approval found. comment ID=${{ steps.find-approval.outputs.comment-id }}"
          fi

